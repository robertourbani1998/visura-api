services:
  visure-service:
    build:
      context: ../..
      dockerfile: .dev/docker/Dockerfile
    ports:
      - "8761:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=:99
    env_file:
      - ../../.env
    volumes:
      - visura-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - laravel

volumes:
  visura-logs:

networks:
  laravel:
    external: true
    name: cercavisure-local_sail
