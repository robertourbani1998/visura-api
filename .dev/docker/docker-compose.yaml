services:
  visure-service:
    build:
      context: ../..
      dockerfile: .dev/docker/Dockerfile
    ports:
      - "8761:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=:99
    env_file:
      - ../../.env
    volumes:
      - visura-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      # `curl` non è installato nell'immagine: usiamo Python che è sempre
      # presente. Codice di uscita 0 solo se /health risponde 200.
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys;\nr=urllib.request.urlopen('http://localhost:8000/health',timeout=5);\nsys.exit(0 if r.status==200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - laravel

volumes:
  visura-logs:

networks:
  laravel:
    external: true
    name: cercavisure-local_sail
